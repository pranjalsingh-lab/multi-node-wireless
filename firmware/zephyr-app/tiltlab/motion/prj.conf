# BLE broadcaster (beacon) - streams X/Y/Z as manufacturer advertising data
CONFIG_BT=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_PERIPHERAL=n
CONFIG_BT_CENTRAL=n
CONFIG_BT_DEVICE_NAME="tilt-sensor"

# ADXL372 accelerometer over SPI
CONFIG_SENSOR=y
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_ADXL372=y

# integer-only prints, keep the image small
CONFIG_CBPRINTF_FP_SUPPORT=n
